services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: migration_queue
      POSTGRES_PASSWORD: migration_queue
      POSTGRES_DB: migration_queue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U migration_queue"]
      interval: 2s
      timeout: 2s
      retries: 20

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://migration_queue:migration_queue@postgres:5432/migration_queue?sslmode=disable"
      JWT_SECRET: "dev-secret-change-me"
      SMS_ADAPTER: "console"
      MIGRATIONS_PATH: "/migrations"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "changeme-dev-only"
    ports:
      - "8080:8080"

volumes:
  pgdata:
